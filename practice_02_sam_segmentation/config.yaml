# Model names can be Hugging Face ids or local model directories.
sam2_model_name: facebook/sam2.1-hiera-large
sam3_model_name: facebook/sam3

# Device: cuda or cpu. Leave empty to let scripts auto-detect.
device: cuda

# Input image path is resolved relative to this config file.
image_path: ../dataset/images/seg_demo.jpg

# Outputs are written under this directory:
#   outputs/sam2
#   outputs/sam3
output_dir: outputs

# Mask threshold for converting probability masks to binary masks.
confidence_threshold: 0.5

# SAM2 supports point prompts directly.
# Format: [x, y, label], where label=1 means foreground and label=0 means background.
point_prompts:
  - [320, 240, 1]

# SAM2 and SAM3 both support box prompts.
# Format: [x1, y1, x2, y2]
box_prompts:
  - [100, 80, 520, 420]

# SAM3 script keeps this field for teaching logs.
# This classroom script still uses box prompts for deterministic visualization.
text_prompts:
  - target object
